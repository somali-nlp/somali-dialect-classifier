name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "data/metrics/**"
      - "data/reports/**"
      - "src/dashboard/**"
      - "scripts/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes detected'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pydantic numpy

      - name: Build dashboard site
        run: |
          chmod +x src/dashboard/build-site.sh
          ./src/dashboard/build-site.sh

      - name: Generate metrics data
        run: |
          python scripts/ops/export_dashboard_data.py
          python scripts/ops/generate_quality_feed.py

      - name: Verify build
        run: |
          echo "Build verification:"
          ls -lh _site/
          echo ""
          ls -lh _site/data/
          echo ""
          if [ -f "_site/data/all_metrics.json" ]; then
            echo "all_metrics.json present"
            head -20 _site/data/all_metrics.json
          else
            echo "ERROR: all_metrics.json not found!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Summary
        run: |
          echo "Deployment complete: https://somali-nlp.github.io/somali-dialect-classifier/"
