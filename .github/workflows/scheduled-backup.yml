name: Scheduled Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarrow  # Required for parquet file handling

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run backup
        run: |
          python scripts/ops/backup_system.py

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backups/
          retention-days: 30
          compression-level: 9

      - name: List backup contents
        run: |
          echo "Backup completed successfully"
          ls -lah backups/

      - name: Cleanup old backups
        run: |
          python scripts/ops/backup_system.py --cleanup-only

      - name: Notify on backup failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Backup failed: run #${context.runNumber}`,
              body: [
                `## Scheduled backup failure`,
                ``,
                `**Workflow run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Triggered at:** ${new Date().toISOString()}`,
                ``,
                `The daily backup job failed. Investigate immediately — silver data is unprotected until the next successful run.`,
              ].join('\n'),
              labels: ['bug', 'sre', 'automated'],
            });
