name: Scheduled Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarrow  # Required for parquet file handling

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run backup
        run: |
          python scripts/ops/backup_system.py

      - name: Upload backup artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backups/
          retention-days: 30
          compression-level: 9

      - name: List backup contents
        run: |
          echo "Backup completed successfully"
          ls -lah backups/

      - name: Cleanup old backups
        run: |
          python scripts/ops/backup_system.py --cleanup-only

      - name: Notify on backup failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Backup failed: run #${context.runNumber}`,
              body: [
                `## Scheduled backup failure`,
                ``,
                `**Workflow run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Triggered at:** ${new Date().toISOString()}`,
                ``,
                `The daily backup job failed. Investigate immediately — silver data is unprotected until the next successful run.`,
              ].join('\n'),
              labels: ['bug', 'sre', 'automated'],
            });
